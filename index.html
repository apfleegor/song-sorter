<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taylor Swift Song Sorter</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --cream: #f5f0e8;
      --blush: #e8c4b8;
      --rose: #c4706a;
      --wine: #7a2d3a;
      --ink: #1a1015;
      --gold: #c9a84c;
      --mist: #d6cfc7;
      --white: #fffdf9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%;
      text-align: center;
      padding: 3rem 1rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 400;
      color: var(--wine);
      line-height: 1.1;
    }

    h1 em {
      font-style: italic;
      color: var(--rose);
    }

    .divider {
      width: 80px;
      height: 1px;
      background: var(--gold);
      margin: 1.25rem auto;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '✦';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.6rem;
      color: var(--gold);
    }

    .divider::before {
      left: -1rem;
    }

    .divider::after {
      right: -1rem;
    }

    /* ── SELECTION SCREEN ─────────────────────────────── */
    #selectionScreen {
      width: min(780px, 95vw);
      position: relative;
      z-index: 1;
      padding-bottom: 6rem;
    }

    .global-options {
      background: var(--white);
      border: 1px solid var(--mist);
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      align-items: center;
    }

    .global-options p {
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rose);
      font-weight: 500;
      flex-basis: 100%;
      margin-bottom: -0.5rem;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      font-size: 1rem;
      color: var(--ink);
      user-select: none;
    }

    .toggle-label input[type="checkbox"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--mist);
      background: var(--cream);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }

    .toggle-label input[type="checkbox"]:checked {
      background: var(--wine);
      border-color: var(--wine);
    }

    .toggle-label input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 0.7rem;
      line-height: 18px;
      text-align: center;
    }

    .toggle-label span {
      line-height: 1.2;
    }

    .toggle-label small {
      display: block;
      font-size: 0.8rem;
      color: var(--mist);
      margin-top: 0.1rem;
    }

    /* Album blocks */
    .album-block {
      background: var(--white);
      border: 1px solid var(--mist);
      margin-bottom: 0.75rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .album-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.25rem;
      cursor: pointer;
      user-select: none;
      gap: 1rem;
    }

    .album-header:hover {
      background: rgba(232, 196, 184, 0.15);
    }

    .album-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
      min-width: 0;
    }

    .album-checkbox {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--mist);
      background: var(--cream);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .album-checkbox:checked {
      background: var(--wine);
      border-color: var(--wine);
    }

    .album-checkbox:checked::after {
      content: '✓';
      position: absolute;
      inset: 0;
      color: white;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .album-checkbox.indeterminate {
      background: var(--blush);
      border-color: var(--rose);
    }

    .album-checkbox.indeterminate::after {
      content: '–';
      position: absolute;
      inset: 0;
      color: var(--wine);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 16px;
    }

    .album-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--wine);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .album-count {
      font-size: 0.75rem;
      color: var(--mist);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .album-chevron {
      width: 20px;
      height: 20px;
      color: var(--mist);
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }

    .album-block.open .album-chevron {
      transform: rotate(180deg);
    }

    .album-songs {
      border-top: 1px solid var(--mist);
      padding: 0.5rem 0;
    }

    .song-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.4rem 1.25rem 0.4rem 2.5rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .song-row:hover {
      background: rgba(232, 196, 184, 0.15);
    }

    .song-row input[type="checkbox"] {
      appearance: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--mist);
      background: var(--cream);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .song-row input[type="checkbox"]:checked {
      background: var(--rose);
      border-color: var(--rose);
    }

    .song-row input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      inset: 0;
      color: white;
      font-size: 0.55rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .song-row label {
      font-size: 0.95rem;
      color: var(--ink);
      cursor: pointer;
      line-height: 1.3;
      flex: 1;
    }

    .song-row.is-version label {
      color: #999;
      font-style: italic;
    }

    .song-row.is-noalbum label {
      color: #999;
    }

    .badge {
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.15rem 0.4rem;
      border-radius: 2px;
      white-space: nowrap;
    }

    .badge-version {
      background: rgba(201, 168, 76, 0.15);
      color: var(--gold);
      border: 1px solid rgba(201, 168, 76, 0.3);
    }

    .badge-nonalbum {
      background: rgba(196, 112, 106, 0.1);
      color: var(--rose);
      border: 1px solid rgba(196, 112, 106, 0.2);
    }

    /* Sticky footer bar */
    .selection-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--wine);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      z-index: 100;
    }

    .selection-footer .count-text {
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }

    .selection-footer .count-text strong {
      color: white;
      font-size: 1.1rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }

    .btn-start {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.65rem 2rem;
      border: 1.5px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start:hover:not(:disabled) {
      background: white;
      color: var(--wine);
    }

    .btn-start:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── SORTER SCREEN ────────────────────────────────── */
    #sorterScreen {
      display: none;
      width: 100%;
    }

    #battleNumber {
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      color: var(--rose);
      text-transform: uppercase;
      min-height: 2.5rem;
      text-align: center;
      margin-bottom: 0.5rem;
      position: relative;
      z-index: 1;
    }

    #progressWrap {
      width: min(500px, 90vw);
      height: 3px;
      background: var(--mist);
      border-radius: 2px;
      margin: 0 auto 2.5rem;
      overflow: hidden;
    }

    #progressBar {
      height: 100%;
      background: linear-gradient(90deg, var(--rose), var(--gold));
      width: 0%;
      transition: width 0.5s ease;
    }

    #arena {
      display: flex;
      align-items: stretch;
      gap: 0;
      width: min(780px, 95vw);
      min-height: 220px;
      position: relative;
      z-index: 1;
      margin: auto;
    }

    .song-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
      cursor: pointer;
      border: 1px solid var(--mist);
      background: white;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      text-align: center;
      min-height: 180px;
    }

    .song-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--blush), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .song-card:hover::before {
      opacity: 1;
    }

    .song-card:hover {
      border-color: var(--rose);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(122, 45, 58, 0.12);
    }

    #leftCard {
      border-right: none;
    }

    #rightCard {
      border-left: none;
    }

    .vs-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      flex-shrink: 0;
      background: white;
      border-top: 1px solid var(--mist);
      border-bottom: 1px solid var(--mist);
    }

    .vs-label {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--mist);
      writing-mode: vertical-rl;
      letter-spacing: 0.15em;
    }

    .song-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 2.5vw, 1.45rem);
      font-weight: 400;
      color: var(--ink);
      line-height: 1.3;
      position: relative;
      z-index: 1;
    }

    .card-hint {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mist);
      margin-top: 0.75rem;
      position: relative;
      z-index: 1;
      transition: color 0.25s;
    }

    .song-card:hover .card-hint {
      color: var(--rose);
    }

    #controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      z-index: 1;
      position: relative;
    }

    .btn {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.65rem 1.6rem;
      border: 1px solid currentColor;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-tie {
      color: var(--wine);
    }

    .btn-tie:hover {
      background: var(--wine);
      color: white;
    }

    .btn-undo {
      color: var(--mist);
      border-color: var(--mist);
      font-size: 0.8rem;
    }

    .btn-undo:not(:disabled):hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    .btn-undo:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .btn-back {
      color: var(--rose);
      border-color: var(--rose);
    }

    .btn-back:hover {
      background: var(--rose);
      color: white;
    }

    .btn-csv {
      color: var(--gold);
      border-color: var(--gold);
    }

    .btn-csv:hover {
      background: var(--gold);
      color: white;
    }

    /* Result */
    #resultSection {
      width: min(540px, 92vw);
      margin: 1rem auto 4rem;
      z-index: 1;
      position: relative;
      display: none;
    }

    #resultSection h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 400;
      font-style: italic;
      color: var(--wine);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    #resultField table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1rem;
    }

    #resultField th {
      background: var(--wine);
      color: white;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-size: 0.78rem;
      padding: 0.65rem 1rem;
      text-align: left;
    }

    #resultField th:first-child {
      text-align: center;
      width: 60px;
    }

    #resultField td {
      padding: 0.55rem 1rem;
      border-bottom: 1px solid var(--mist);
      color: var(--ink);
    }

    #resultField td:first-child {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--rose);
    }

    #resultField tr:nth-child(even) td {
      background: rgba(232, 196, 184, 0.12);
    }

    #resultField tr:hover td {
      background: rgba(196, 112, 106, 0.08);
    }

    footer {
      position: fixed;
      bottom: 1rem;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--mist);
      text-transform: uppercase;
      z-index: 1;
      /* pointer-events: none; */
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .album-block {
      animation: fadeUp 0.35s ease both;
    }

    #siteFooter a {
      color: var(--mist);
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color 0.2s;
    }

    #siteFooter a:hover {
      color: var(--rose);
    }
  </style>
</head>

<body>

  <header>
    <p class="subtitle">A definitive ranking</p>
    <h1>Taylor Swift<br><em>Song Sorter</em></h1>
    <div class="divider"></div>
  </header>

  <!-- ══ SELECTION SCREEN ══════════════════════════════════ -->
  <div id="selectionScreen">

    <div class="global-options">
      <p>Include globally</p>
      <label class="toggle-label">
        <input type="checkbox" id="chk-versions" onchange="onGlobalToggle('versions')">
        <span>
          Alternate versions
          <small>Acoustics, remixes, bonus edits…</small>
        </span>
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="chk-nonalbum" onchange="onGlobalToggle('nonalbum')">
        <span>
          Non-album &amp; collaborations
          <small>Soundtrack songs, features, EPs…</small>
        </span>
      </label>
    </div>

    <div id="albumList"></div>

    <div class="selection-footer">
      <div class="count-text">
        <strong id="selectedCount">0</strong> songs selected
      </div>
      <button class="btn-start" id="btnStart" onclick="startSorter()" disabled>
        I'm ready to start ✦
      </button>
    </div>
  </div>

  <!-- ══ SORTER SCREEN ═════════════════════════════════════ -->
  <div id="sorterScreen">
    <div id="battleNumber"></div>
    <div id="progressWrap">
      <div id="progressBar"></div>
    </div>

    <div id="arena">
      <div class="song-card" id="leftCard" onclick="sortList(-1)">
        <div class="song-name" id="leftField"></div>
        <div class="card-hint">tap to choose</div>
      </div>
      <div class="vs-divider"><span class="vs-label">or</span></div>
      <div class="song-card" id="rightCard" onclick="sortList(1)">
        <div class="song-name" id="rightField"></div>
        <div class="card-hint">tap to choose</div>
      </div>
    </div>

    <div id="controls">
      <button class="btn btn-tie" onclick="sortList(0)">It's a tie</button>
      <button class="btn btn-undo" id="undoBtn" onclick="undo()" disabled>↩ Undo</button>
      <button class="btn btn-back" onclick="goBack()">← Change Selection</button>
    </div>

    <div id="resultSection">
      <h2>Your Ranking</h2>
      <div id="resultField"></div>
      <br>
      <div style="text-align:center; display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
        <button class="btn btn-back" onclick="goBack()">← Change Selection</button>
        <button class="btn btn-csv" onclick="downloadCSV()">↓ Download CSV</button>
      </div>
    </div>
  </div>

  <footer id="siteFooter">
    ✦ &nbsp; choose wisely &nbsp; ✦ &nbsp;·&nbsp; built by Claude &nbsp; ✦ &nbsp;·&nbsp; based on <a
      href="https://www.tumblr.com/jesseepinkman" target="_blank">@jesseepinkman</a>
  </footer>

      { "song": "Ruin the Friendship", "album": "The Life of a Showgirl", "additional_version": false, "non_album": false },
      { "song": "Ruin the Friendship (My Advice Version)", "album": "The Life of a Showgirl", "additional_version": true, "non_album": false },
      { "song": "Actually Romantic", "album": "The Life of a Showgirl", "additional_version": false, "non_album": false },
      { "song": "Wi$h Li$t", "album": "The Life of a Showgirl", "additional_version": false, "non_album": false },
      { "song": "Wi$h Li$t (Settled Down Acoustic Version)", "album": "The Life of a Showgirl", "additional_version": true, "non_album": false },
      { "song": "Wood", "album": "The Life of a Showgirl", "additional_version": false, "non_album": false },
      { "song": "CANCELLED!", "album": "The Life of a Showgirl", "additional_version": false, "non_album": false },
      { "song": "Honey", "album": "The Life of a Showgirl", "additional_version": false, "non_album": false },
      { "song": "The Life of a Showgirl (feat. Sabrina Carpenter)", "album": "The Life of a Showgirl", "additional_version": false, "non_album": false },
      { "song": "The Life of a Showgirl (feat. Sabrina Carpenter) (Dressing Room Rehearsal Version)", "album": "The Life of a Showgirl", "additional_version": true, "non_album": false }
    ];

    const ALBUM_ORDER = [
      "Taylor Swift", "Fearless", "Speak Now", "Red", "1989", "reputation",
      "Lover", "folklore", "evermore", "Midnights",
      "The Tortured Poets Department", "The Life of a Showgirl",
      "Other / Unreleased", "Beautiful Eyes EP",
      "Holiday Collection", "Collaboration", "Non-Album"
    ];

    // ── SELECTION STATE ─────────────────────────────────────────────────────────
    const songChecked = new Array(SONG_DATA.length).fill(false);

    // albumMeta[album] = { chkEl, indices }
    const albumMeta = {};

    function buildSelectionUI() {
      // Default: on if not additional_version and not non_album
      for (let i = 0; i < SONG_DATA.length; i++) {
        songChecked[i] = !SONG_DATA[i].additional_version && !SONG_DATA[i].non_album;
      }

      // Group by album
      const albumMap = {};
      SONG_DATA.forEach((s, i) => {
        if (!albumMap[s.album]) albumMap[s.album] = [];
        albumMap[s.album].push(i);
      });

      const orderedAlbums = [
        ...ALBUM_ORDER.filter(a => albumMap[a]),
        ...Object.keys(albumMap).filter(a => !ALBUM_ORDER.includes(a))
      ];

      const container = document.getElementById('albumList');
      container.innerHTML = '';

      orderedAlbums.forEach((album, ai) => {
        const indices = albumMap[album];
        albumMeta[album] = { indices };

        const block = document.createElement('div');
        block.className = 'album-block';
        block.style.animationDelay = (ai * 0.035) + 's';

        // ── Header ──
        const header = document.createElement('div');
        header.className = 'album-header';

        const left = document.createElement('div');
        left.className = 'album-left';

        const albumChk = document.createElement('input');
        albumChk.type = 'checkbox';
        albumChk.className = 'album-checkbox';
        albumMeta[album].chkEl = albumChk;

        const nameEl = document.createElement('span');
        nameEl.className = 'album-name';
        nameEl.textContent = album;

        left.appendChild(albumChk);
        left.appendChild(nameEl);

        const countEl = document.createElement('span');
        countEl.className = 'album-count';

        // Chevron SVG
        const chevron = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        chevron.setAttribute('viewBox', '0 0 20 20');
        chevron.setAttribute('fill', 'none');
        chevron.setAttribute('stroke', 'currentColor');
        chevron.setAttribute('stroke-width', '1.5');
        chevron.classList.add('album-chevron');
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('stroke-linejoin', 'round');
        path.setAttribute('d', 'M5 7.5l5 5 5-5');
        chevron.appendChild(path);

        header.appendChild(left);
        header.appendChild(countEl);
        header.appendChild(chevron);

        // ── Songs panel ──
        const songsDiv = document.createElement('div');
        songsDiv.className = 'album-songs';
        songsDiv.hidden = true;

        indices.forEach(idx => {
          const s = SONG_DATA[idx];
          const row = document.createElement('div');
          row.className = 'song-row';
          if (s.additional_version) row.classList.add('is-version');
          if (s.non_album) row.classList.add('is-noalbum');

          const chk = document.createElement('input');
          chk.type = 'checkbox';
          chk.id = 'song-' + idx;
          chk.checked = songChecked[idx];

          const lbl = document.createElement('label');
          lbl.htmlFor = 'song-' + idx;
          lbl.textContent = s.song;

          row.appendChild(chk);
          row.appendChild(lbl);

          if (s.additional_version) {
            const b = document.createElement('span');
            b.className = 'badge badge-version';
            b.textContent = 'alt';
            row.appendChild(b);
          }
          if (s.non_album) {
            const b = document.createElement('span');
            b.className = 'badge badge-nonalbum';
            b.textContent = 'non-album';
            row.appendChild(b);
          }

          chk.addEventListener('change', () => {
            songChecked[idx] = chk.checked;
            refreshAlbumChk(album);
            updateCount();
          });

          row.addEventListener('click', e => {
            if (e.target !== chk) { chk.checked = !chk.checked; chk.dispatchEvent(new Event('change')); }
          });

          songsDiv.appendChild(row);
        });

        // Album checkbox: select/deselect all visible songs
        // albumChk.addEventListener('change', e => {
        //   e.stopPropagation();
        //   const wantChecked = albumChk.checked;
        //   albumChk.classList.remove('indeterminate');
        //   indices.forEach(idx => {
        //     const s = SONG_DATA[idx];
        //     const incV = document.getElementById('chk-versions').checked;
        //     const incN = document.getElementById('chk-nonalbum').checked;
        //     // When turning off, turn off everything; when turning on, respect global filters
        //     const allowed = !s.additional_version || incV;
        //     const allowedN = !s.non_album || incN;
        //     if (!wantChecked || (allowed && allowedN)) {
        //       songChecked[idx] = wantChecked;
        //       document.getElementById('song-' + idx).checked = wantChecked;
        //     }
        //   });
        //   refreshAlbumChk(album);
        //   updateCount();
        // });
        albumChk.addEventListener('change', e => {
          e.stopPropagation();
          const allChecked = indices.every(i => songChecked[i]);
          const wantChecked = !allChecked;
          indices.forEach(idx => {
            songChecked[idx] = wantChecked;
            document.getElementById('song-' + idx).checked = wantChecked;
          });
          refreshAlbumChk(album);
          updateCount();
        });

        // Expand/collapse
        header.addEventListener('click', e => {
          if (e.target === albumChk) return;
          const open = !block.classList.contains('open');
          block.classList.toggle('open', open);
          songsDiv.hidden = !open;
        });

        block.appendChild(header);
        block.appendChild(songsDiv);
        container.appendChild(block);
      });

      // Initial state sync
      orderedAlbums.forEach(a => refreshAlbumChk(a));
      updateCount();
    }

    function refreshAlbumChk(album) {
      const { chkEl, indices } = albumMeta[album];
      const total = indices.length;
      const checked = indices.filter(i => songChecked[i]).length;
      if (checked === 0) {
        chkEl.checked = false;
        chkEl.classList.remove('indeterminate');
      } else if (checked === total) {
        chkEl.checked = true;
        chkEl.classList.remove('indeterminate');
      } else {
        chkEl.checked = false;
        chkEl.classList.add('indeterminate');
      }
    }

    function updateCount() {
      const count = songChecked.filter(Boolean).length;
      document.getElementById('selectedCount').textContent = count;
      document.getElementById('btnStart').disabled = count < 2;
    }

    function onGlobalToggle(type) {
      const incVersions = document.getElementById('chk-versions').checked;
      const incNonAlbum = document.getElementById('chk-nonalbum').checked;

      SONG_DATA.forEach((s, i) => {
        const el = document.getElementById('song-' + i);
        if (!el) return;
        if (type === 'versions' && s.additional_version) {
          songChecked[i] = incVersions;
          el.checked = incVersions;
        }
        if (type === 'nonalbum' && s.non_album) {
          songChecked[i] = incNonAlbum;
          el.checked = incNonAlbum;
        }
      });

      Object.keys(albumMeta).forEach(a => refreshAlbumChk(a));
      updateCount();
    }

    // ── SORTER ──────────────────────────────────────────────────────────────────
    let namMember = [];
    let lstMember = [], parent = [], equal = [], rec = [];
    let cmp1, cmp2, head1, head2, nrec;
    let numQuestion, totalSize, finishSize, finishFlag;
    let undoState = null;

    function startSorter() {
      namMember = SONG_DATA.filter((_, i) => songChecked[i]).map(s => s.song);
      if (namMember.length < 2) return;

      document.getElementById('selectionScreen').style.display = 'none';
      document.getElementById('siteFooter').style.display = 'none';
      document.getElementById('sorterScreen').style.display = 'block';
      document.getElementById('resultSection').style.display = 'none';
      document.getElementById('arena').style.display = 'flex';
      document.getElementById('controls').style.display = 'flex';

      initList();
      showImage();
    }

    function goBack() {
      document.getElementById('sorterScreen').style.display = 'none';
      document.getElementById('siteFooter').style.display = '';
      document.getElementById('selectionScreen').style.display = 'block';
    }

    function saveUndoState() {
      undoState = {
        cmp1, cmp2, head1, head2, nrec, numQuestion, finishSize,
        rec: rec.slice(), equal: equal.slice(),
        lstMember: lstMember.map(a => a.slice()),
        parent: parent.slice()
      };
      updateUndoButton();
    }

    function undo() {
      if (!undoState) return;
      ({ cmp1, cmp2, head1, head2, nrec, numQuestion, finishSize } = undoState);
      rec = undoState.rec.slice();
      equal = undoState.equal.slice();
      lstMember = undoState.lstMember.map(a => a.slice());
      parent = undoState.parent.slice();
      undoState = null; finishFlag = 0;
      document.getElementById('resultField').innerHTML = '';
      document.getElementById('resultSection').style.display = 'none';
      document.getElementById('arena').style.display = 'flex';
      document.getElementById('controls').style.display = 'flex';
      updateUndoButton();
      showImage();
    }

    function updateUndoButton() {
      document.getElementById('undoBtn').disabled = !undoState;
    }

    function updateProgress(pct) {
      document.getElementById('progressBar').style.width = pct + '%';
    }

    function initList() {
      lstMember = []; parent = []; equal = []; rec = [];
      let n = 0;
      lstMember[n] = namMember.map((_, i) => i);
      parent[n] = -1;
      totalSize = 0; n++;

      for (let i = 0; i < lstMember.length; i++) {
        if (lstMember[i].length >= 2) {
          const mid = Math.ceil(lstMember[i].length / 2);
          lstMember[n] = lstMember[i].slice(0, mid); totalSize += lstMember[n].length; parent[n] = i; n++;
          lstMember[n] = lstMember[i].slice(mid); totalSize += lstMember[n].length; parent[n] = i; n++;
        }
      }

      for (let i = 0; i < namMember.length; i++) rec[i] = 0;
      nrec = 0;
      for (let i = 0; i <= namMember.length; i++) equal[i] = -1;
      cmp1 = lstMember.length - 2; cmp2 = lstMember.length - 1;
      head1 = 0; head2 = 0;
      numQuestion = 1; finishSize = 0; finishFlag = 0;
      undoState = null;
      updateUndoButton();
      updateProgress(0);
    }

    function sortList(flag) {
      saveUndoState();

      if (flag < 0) {
        rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while (equal[rec[nrec - 1]] != -1) { rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
      } else if (flag > 0) {
        rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while (equal[rec[nrec - 1]] != -1) { rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
      } else {
        rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++;
        while (equal[rec[nrec - 1]] != -1) { rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
        equal[rec[nrec - 1]] = lstMember[cmp2][head2];
        rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++;
        while (equal[rec[nrec - 1]] != -1) { rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
      }

      if (head1 < lstMember[cmp1].length && head2 === lstMember[cmp2].length) {
        while (head1 < lstMember[cmp1].length) { rec[nrec] = lstMember[cmp1][head1]; head1++; nrec++; finishSize++; }
      } else if (head1 === lstMember[cmp1].length && head2 < lstMember[cmp2].length) {
        while (head2 < lstMember[cmp2].length) { rec[nrec] = lstMember[cmp2][head2]; head2++; nrec++; finishSize++; }
      }

      if (head1 === lstMember[cmp1].length && head2 === lstMember[cmp2].length) {
        for (let i = 0; i < lstMember[cmp1].length + lstMember[cmp2].length; i++) {
          lstMember[parent[cmp1]][i] = rec[i];
        }
        lstMember.pop(); lstMember.pop();
        cmp1 -= 2; cmp2 -= 2;
        head1 = 0; head2 = 0;
        for (let i = 0; i < namMember.length; i++) rec[i] = 0;
        nrec = 0;
      }

      const pct = Math.floor(finishSize * 100 / totalSize);
      updateProgress(pct);

      if (cmp1 < 0) {
        document.getElementById('battleNumber').innerHTML = 'Battle #' + (numQuestion - 1) + '<br>' + pct + '% sorted.';
        showResult(); finishFlag = 1;
      } else {
        showImage();
      }
    }

    function showResult() {
      let ranking = 1, sameRank = 1, str = '';
      str += '<table><tr><th>#</th><th>Song</th></tr>';
      for (let i = 0; i < namMember.length; i++) {
        str += '<tr><td>' + ranking + '</td><td>' + namMember[lstMember[0][i]] + '</td></tr>';
        if (i < namMember.length - 1) {
          if (equal[lstMember[0][i]] === lstMember[0][i + 1]) sameRank++;
          else { ranking += sameRank; sameRank = 1; }
        }
      }
      str += '</table>';
      document.getElementById('resultField').innerHTML = str;
      document.getElementById('arena').style.display = 'none';
      document.getElementById('controls').style.display = 'none';
      document.getElementById('resultSection').style.display = 'block';
    }

    function showImage() {
      const pct = Math.floor(finishSize * 100 / totalSize);
      document.getElementById('battleNumber').innerHTML =
        'Battle #' + numQuestion + ' &nbsp;·&nbsp; ' + pct + '% sorted';
      document.getElementById('leftField').textContent = namMember[lstMember[cmp1][head1]];
      document.getElementById('rightField').textContent = namMember[lstMember[cmp2][head2]];
      numQuestion++;
    }

    function downloadCSV() {
      let ranking = 1, sameRank = 1;
      const rows = [['Rank', 'Song']];
      for (let i = 0; i < namMember.length; i++) {
        const song = namMember[lstMember[0][i]];
        rows.push([ranking, '"' + song.replace(/"/g, '""') + '"']);
        if (i < namMember.length - 1) {
          if (equal[lstMember[0][i]] === lstMember[0][i + 1]) sameRank++;
          else { ranking += sameRank; sameRank = 1; }
        }
      }
      const csv = rows.map(r => r.join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'taylor-swift-ranking.csv'; a.click();
      URL.revokeObjectURL(url);
    }

    // ── INIT ────────────────────────────────────────────────────────────────────
    buildSelectionUI();
  </script>
